<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
color:#222;
}

header{
background:#0d6efd;
color:#fff;
padding:40px 20px;
text-align:center;
}

header h1{
font-size:42px;
}

header p{
margin-top:10px;
font-size:18px;
}

.search{
max-width:700px;
margin:30px auto;
display:flex;
padding:0 15px;
}

.search input{
width:100%;
padding:15px;
font-size:17px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.note{
background:#fff;
padding:20px;
margin-bottom:18px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
transition:.3s;
}

.note:hover{
transform:translateY(-3px);
}

.note a{
font-size:22px;
font-weight:bold;
color:#0d6efd;
text-decoration:none;
}

.note p{
margin-top:8px;
color:#555;
}

footer{
background:#222;
color:#fff;
text-align:center;
padding:25px;
margin-top:40px;
}

.no-result{
text-align:center;
padding:30px;
display:none;
font-size:18px;
color:#777;
}

</style>

</div>

No topic found.

</div>
